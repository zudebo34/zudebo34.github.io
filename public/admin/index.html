<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content Manager</title>
</head>
<body>
  <script>
    var hash = window.location.hash.replace(/^#\/?/, '');
    var params = new URLSearchParams(hash);
    var token = params.get('access_token') || new URLSearchParams(window.location.search).get('access_token');
    if (token) {
      localStorage.setItem('decap-cms-token', token);
      localStorage.setItem('decap-cms-github-zudebo34-zudebo34.github.io-token', token);
      history.replaceState(null, '', '/admin/');
    }
  </script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
